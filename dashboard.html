<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KICK_QUIZ — Virtual Office</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:#f0ebe3;color:#2d2d2d;height:100vh;overflow:hidden}
.container{display:flex;flex-direction:column;height:100vh}
.office{flex:0 0 55%;position:relative;background:#f5f0e6;background-image:radial-gradient(circle,#e3d9c6 1px,transparent 1px);background-size:20px 20px;overflow:hidden;border-bottom:3px solid #8B7355}
.section-grid{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1.2fr 1fr;grid-template-rows:1fr 0.8fr 1fr}
.zone{border:1px solid #d4c9b4;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,252,245,0.3);min-height:0}
.zone-label{position:absolute;top:3px;left:5px;font-size:8px;color:#8B7355;font-weight:700;background:rgba(255,255,255,0.6);padding:1px 5px;border-radius:3px}
.zone-1{grid-column:1;grid-row:1}
.zone-2{grid-column:1;grid-row:2}
.zone-3{grid-column:1;grid-row:3}
.zone-4{grid-column:2;grid-row:3}
.zone-5{grid-column:3;grid-row:2}
.zone-6{grid-column:3;grid-row:3}
.zone-exec{grid-column:3;grid-row:1;background:linear-gradient(135deg,#fffcf0,#f5efe0);border:2px solid #c4a882}
.zone-exec .btn-group{display:flex;gap:4px;margin-top:4px}
.exec-btn{padding:4px 12px;border-radius:6px;font-size:9px;cursor:pointer;border:none;font-weight:700}
.exec-btn-on{background:#4CAF50;color:#fff}
.exec-btn-off{background:#e53935;color:#fff}
.zone-meeting{grid-column:2;grid-row:1/3;border:2px dashed #c4a882;background:rgba(255,255,240,0.5)}
.meeting-desk{width:60%;height:30%;background:linear-gradient(180deg,#c4a882,#a0845c);border-radius:50%;border:2px solid #7a6548;display:flex;align-items:center;justify-content:center;font-size:8px;color:white;font-weight:700}
.bottom{flex:1;display:grid;grid-template-columns:1fr 2.2fr;min-height:0;background:#faf7f0;border-top:2px solid #c4a882}
.cmd-panel{padding:10px 12px;border-right:2px solid #c4a882;display:flex;flex-direction:column;gap:5px;background:#fcf9f3}
.cmd-header{font-size:12px;color:#6b5930;font-weight:700;display:flex;align-items:center;gap:4px}
.cmd-status{font-size:9px;color:#aaa}
.cmd-input{display:flex;gap:4px}
.cmd-input input{flex:1;background:#fff;border:1px solid #c4a882;border-radius:5px;padding:5px 7px;font-size:10px}
.cmd-btn{padding:5px 10px;background:#2563eb;color:#fff;border:none;border-radius:5px;font-size:10px;cursor:pointer;font-weight:600}
.log-zone{overflow-y:auto;padding:10px 14px;background:#f7f3ea}
.log-title{font-size:13px;font-weight:700;color:#6b5930;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.log-entry{padding:5px 6px;border-bottom:1px solid #e0d6c2;display:flex;align-items:flex-start;gap:6px;font-size:12px}
.log-icon{flex-shrink:0;font-size:12px}
.log-who{font-weight:700;color:#333;font-size:11px}
.log-what{color:#555;line-height:1.5;font-size:12px}
.log-time{font-size:9px;color:#bbb;margin-left:6px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:none;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:24px;width:360px;max-width:90vw;box-shadow:0 8px 30px rgba(0,0,0,0.2)}
.modal h2{font-size:16px;margin-bottom:8px;color:#2d2d2d}
.modal p{font-size:12px;color:#888;margin-bottom:10px}
.modal-input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:12px}
.modal-btn{padding:8px 20px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600}
.dept-tags{display:flex;gap:3px;flex-wrap:wrap}
.dept-tag{padding:2px 8px;border-radius:10px;font-size:9px;cursor:pointer;border:1px solid #c4a882;background:#fff;color:#6b5930;font-weight:600}
.dept-tag.active,.dept-tag:hover{background:#2563eb;color:#fff;border-color:#2563eb}
.live-dot{width:6px;height:6px;border-radius:50%;background:#f44336;display:inline-block;animation:pulse 1.5s infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.working .agent-avatar{animation:bob 1.2s infinite}
.bubble{position:absolute;background:#fff;border:1px solid #d4c9b4;border-radius:6px;padding:3px 7px;font-size:8px;color:#333;max-width:130px;line-height:1.4;white-space:nowrap;z-index:10;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.bubble::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:4px solid #fff}
@keyframes floatBubble{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
</style>
</head>
<body>
<div class="container">
  <div class="office">
    <div class="section-grid">
      <div class="zone zone-1"><div class="zone-label">1팀 기획</div><div class="agent-zone" data-zone="zone-1"></div></div>
      <div class="zone zone-2"><div class="zone-label">2팀 디자인</div><div class="agent-zone" data-zone="zone-2"></div></div>
      <div class="zone zone-3"><div class="zone-label">3팀 백엔드</div><div class="agent-zone" data-zone="zone-3"></div></div>
      <div class="zone zone-4"><div class="zone-label">4팀 AI/로직</div><div class="agent-zone" data-zone="zone-4"></div></div>
      <div class="zone zone-5"><div class="zone-label">5팀 QA</div><div class="agent-zone" data-zone="zone-5"></div></div>
      <div class="zone zone-6"><div class="zone-label">6팀 문서/보안</div><div class="agent-zone" data-zone="zone-6"></div></div>
      <div class="zone zone-meeting"><div class="zone-label">회의실</div>
        <div class="meeting-desk" id="meetingDesk">팀장 회의 대기</div>
      </div>
      <div class="zone zone-exec"><div class="zone-label">★ 대표실</div>
        <div style="font-size:22px;margin-top:4px">👤</div>
        <div style="font-size:9px;color:#8B6914;font-weight:700" id="bossStatus">출근</div>
        <div class="btn-group">
          <button class="exec-btn exec-btn-on" onclick="bossOn()">출근</button>
          <button class="exec-btn exec-btn-off" onclick="bossOff()">퇴근</button>
        </div>
      </div>
    </div>
  </div>
  <div class="bottom">
    <div class="cmd-panel">
      <div class="cmd-header">📋 명령 <span class="cmd-status" id="cmdTarget">(전체)</span></div>
      <div class="cmd-input">
        <input id="cmdInput" placeholder="지시 내용 입력">
        <button class="cmd-btn" onclick="copyCmd()">복사</button>
      </div>
      <div class="dept-tags" id="deptTags"></div>
      <div style="font-size:8px;color:#ccc;margin-top:2px">지시 복사 후 OpenCode에 전달 → 즉시 반영</div>
      <div style="display:flex;gap:4px;margin-top:4px">
        <button class="cmd-btn" style="flex:1;background:#4CAF50;font-size:9px" onclick="quickCmd('앱 1차 시안 최종 점검. 앱/index.html 실행 확인')">⏱️ 점검</button>
        <button class="cmd-btn" style="flex:1;background:#f97316;font-size:9px" onclick="quickCmd('발표자료 docs/presentation.html 슬라이드 확인')">📊 발표</button>
        <button class="cmd-btn" style="flex:1;background:#8b5cf6;font-size:9px" onclick="quickCmd('questionBank.json 245문항 전체 검증')">🔍 DB 검증</button>
      </div>
    </div>
    <div class="log-zone">
      <div class="log-title"><span class="live-dot"></span> 실시간 로그 <span id="updateTime" style="font-size:9px;color:#bbb;font-weight:400"></span></div>
      <div id="logFeed"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="meetingModal">
  <div class="modal">
    <h2>🟢 대표님 출근</h2>
    <p>회의를 시작합니다. 오늘의 지시사항을 입력하세요.</p>
    <textarea class="modal-input" id="meetingOrder" rows="3" placeholder="예: 앱 QA 진행, 발표자료 슬라이드 확인..."></textarea>
    <button class="modal-btn" onclick="startMeeting()">회의 시작</button>
    <button style="margin-left:6px;padding:8px 16px;background:#eee;border:none;border-radius:6px;font-size:12px;cursor:pointer" onclick="closeModal()">취소</button>
  </div>
</div>

<script>
var BOSS_ON = true;
var selD = null;
var meetingLog = [];

// Map departments to zones
var DEPT_ZONE = {
  '기획팀':'zone-1','디자인팀':'zone-2','백엔드팀':'zone-3','AI팀':'zone-4','QA팀':'zone-5','보안팀':'zone-6','법률팀':'zone-6'
};
var DEPT_COLOR = {
  '기획팀':'#2563eb','디자인팀':'#f97316','백엔드팀':'#10b981','AI팀':'#8b5cf6','QA팀':'#f59e0b','보안팀':'#ef4444','법률팀':'#6b7280'
};

function buildSVG(c,w,h,ld){
  var hr=Math.round(w*0.3),cx=w/2,hcy=hr+2,tt=hr*2+3;
  var sx=Math.round(w*0.2),sw=w-sx*2,sh=h-tt;
  var s='<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">';
  s+='<rect x="'+sx+'" y="'+tt+'" width="'+sw+'" height="'+sh+'" rx="4" fill="'+c+'" opacity="0.85"/>';
  if(ld)s+='<polygon points="'+cx+','+(tt-3)+' '+(cx-5)+','+(tt+3)+' '+(cx+5)+','+(tt+3)+'" fill="#fbbf24"/>';
  s+='<circle cx="'+cx+'" cy="'+hcy+'" r="'+hr+'" fill="#f0d9b5"/>';
  s+='<circle cx="'+(cx-3)+'" cy="'+(hcy-1)+'" r="1.5" fill="#333"/>';
  s+='<circle cx="'+(cx+3)+'" cy="'+(hcy-1)+'" r="1.5" fill="#333"/>';
  s+='<path d="M'+(cx-2)+','+(hcy+2)+' Q'+cx+','+(hcy+4)+' '+(cx+2)+','+(hcy+2)+'" fill="none" stroke="#333" stroke-width="0.8"/>';
  s+='</svg>';return s;
}

function fetchState(cb){
  var x=new XMLHttpRequest();
  x.open('GET','/api/state',true);
  x.onload=function(){
    if(x.status===200)try{cb(JSON.parse(x.responseText));}catch(e){cb(null);}
    else cb(null);
  };
  x.onerror=function(){cb(null);};
  x.send();
}

function renderOffice(state){
  if(!state||!state.agents)return;
  // Clear all agent zones
  document.querySelectorAll('.agent-zone').forEach(function(el){el.innerHTML='';});
  var agents=state.agents;
  for(var key in agents){
    var a=agents[key];
    var zone=DEPT_ZONE[a.dept];
    if(!zone)continue;
    var zoneEl=document.querySelector('[data-zone="'+zone+'"]');
    if(!zoneEl)continue;
    var color=DEPT_COLOR[a.dept]||'#888';
    var ld=a.rank==='팀장';
    var w=ld?28:22,h=ld?38:30;
    var wrapper=document.createElement('div');
    wrapper.className=a.status==='working'?'working':'idle';
    wrapper.style.cssText='display:inline-flex;flex-direction:column;align-items:center;margin:2px;vertical-align:top';
    wrapper.innerHTML='<div class="agent-avatar" style="width:'+w+'px;height:'+h+'px">'+buildSVG(color,w,h,ld)+'</div>'
      +'<div style="font-size:7px;color:#fff;background:rgba(0,0,0,0.55);padding:1px 4px;border-radius:3px;white-space:nowrap;margin-top:1px">'+(ld?'★ ':'')+a.name+' | '+a.rank+'</div>';
    if(a.message&&a.status==='working'){
      var bubble=document.createElement('div');
      bubble.className='bubble';
      bubble.style.cssText='top:-28px;left:50%;transform:translateX(-50%);animation:floatBubble 3s infinite';
      bubble.textContent=a.message.length>28?a.message.slice(0,28)+'...':a.message;
      wrapper.appendChild(bubble);
    }
    zoneEl.appendChild(wrapper);
  }
}

function renderLogs(state){
  if(!state)return;
  var feed=document.getElementById('logFeed');
  var logs=(state.logs||[]).concat(meetingLog);
  feed.innerHTML=logs.slice(-30).map(function(l){
    if(typeof l==='string'){
      var m=l.match(/^\[(.+?)\]\s*(.+?):\s*(.+)/);
      if(m)return '<div class="log-entry"><span class="log-icon">·</span><div style="flex:1"><span class="log-who">'+m[2]+'</span><span class="log-time">'+m[1]+'</span><div class="log-what">'+m[3]+'</div></div></div>';
      return '<div class="log-entry"><span class="log-icon">·</span><div class="log-what">'+l+'</div></div>';
    }
    return '<div class="log-entry"><span class="log-icon">'+(l.icon||'·')+'</span><div style="flex:1"><span class="log-who">'+(l.who||'')+'</span><span class="log-time">'+(l.time||'')+'</span><div class="log-what">'+(l.what||'')+'</div></div></div>';
  }).join('');
  feed.scrollTop=feed.scrollHeight;
  document.getElementById('updateTime').textContent='| '+(state.lastUpdated||'').slice(11,16)||'';
}

function renderDeptTags(){
  var tags=document.getElementById('deptTags');
  tags.innerHTML=Object.keys(DEPT_ZONE).filter(function(v,i,a){return a.indexOf(v)===i;}).map(function(d){
    return '<button class="dept-tag" onclick="selD=\''+d+'\';document.getElementById(\'cmdTarget\').innerHTML=\'(→'+d+')\'">'+d+'</button>';
  }).join('');
}

function refresh(){
  fetchState(function(state){
    if(state){
      renderOffice(state);
      renderLogs(state);
    }
  });
}

function bossOn(){
  document.getElementById('meetingModal').style.display='flex';
}
function closeModal(){document.getElementById('meetingModal').style.display='none';}

function startMeeting(){
  var order=document.getElementById('meetingOrder').value.trim()||'1차 시안 최종 점검 및 발표 준비';
  BOSS_ON=true;
  document.getElementById('bossStatus').textContent='출근 중 🟢';
  document.getElementById('meetingDesk').innerHTML='회의 진행 중 📋';
  closeModal();
  meetingLog.push({icon:'▶️',who:'대표님',what:'🟢 출근! "'+order.slice(0,40)+'"',time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})});
  meetingLog.push({icon:'🔄',who:'시스템',what:'전 팀 working 전환 — 지시 반영 시작',time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})});
  refresh();
  // Simulate agents starting work
  fetchState(function(state){
    if(!state)return;
    var agents=state.agents;
    for(var k in agents)agents[k].status='working';
    var x=new XMLHttpRequest();
    x.open('PUT','/api/state',true);
    x.setRequestHeader('Content-Type','application/json');
    x.send(JSON.stringify(state));
  });
}

function bossOff(){
  BOSS_ON=false;
  document.getElementById('bossStatus').textContent='퇴근 🔴';
  document.getElementById('meetingDesk').innerHTML='팀장 회의 대기';
  meetingLog.push({icon:'🔴',who:'대표님',what:'퇴근',time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})});
  fetchState(function(state){
    if(!state)return;
    for(var k in state.agents)state.agents[k].status='idle';
    var x=new XMLHttpRequest();
    x.open('PUT','/api/state',true);
    x.setRequestHeader('Content-Type','application/json');
    x.send(JSON.stringify(state));
  });
}

function copyCmd(){
  var t=document.getElementById('cmdInput').value;
  if(!t)return;
  var cmd='@pipeline task '+(selD||'전체')+' "'+t+'"';
  navigator.clipboard.writeText(cmd).then(function(){showToast('복사됨');}).catch(function(){showToast(cmd);});
}

function quickCmd(msg){
  document.getElementById('cmdInput').value=msg;
  copyCmd();
}

function showToast(msg){
  var t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:6px 14px;border-radius:6px;font-size:11px;z-index:99';document.body.appendChild(t);}
  t.textContent=msg;t.style.display='block';
  setTimeout(function(){t.style.display='none';},2000);
}

// Init
renderDeptTags();
refresh();
setInterval(refresh,3000);
</script>
</body>
</html>
