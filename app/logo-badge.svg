<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3182f6"/>
    </linearGradient>
  </defs>

  <!-- 배지 배경 -->
  <rect width="600" height="600" rx="128" fill="url(#badge)"/>

  <!-- 축구공 외곽 -->
  <circle cx="300" cy="300" r="180" fill="white" opacity="0.95"/>

  <!-- 축구공 패널 라인 -->
  <g stroke="#3182f6" stroke-width="5" fill="none" opacity="0.5">
    <!-- 중앙 오각형 -->
    <polygon points="300,240 370,280 350,350 250,350 230,280"/>
    <!-- 상단 -->
    <polygon points="300,240 180,160 130,215"/>
    <polygon points="300,240 420,160 470,215"/>
    <!-- 측면 -->
    <polygon points="370,280 510,250 500,320"/>
    <polygon points="350,350 520,410 480,465"/>
    <polygon points="250,350 80,410 120,465"/>
    <polygon points="230,280 90,250 100,320"/>
    <!-- 하단 -->
    <polygon points="250,350 235,500 300,515 350,350"/>
    <polygon points="300,515 365,500 370,280"/>
  </g>

  <!-- 물음표 -->
  <text x="300" y="345" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="100" fill="#3182f6">?</text>
</svg>